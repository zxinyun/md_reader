<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<style>body{background:#f8f9fa;margin:0}</style>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f8f9fa;
  --bg-card: #ffffff;
  --bg-code: #f1f3f5;
  --text: #212529;
  --text-secondary: #6c757d;
  --border: #dee2e6;
  --primary: #6c5ce7;
  --primary-hover: #5a4bd1;
  --primary-light: rgba(108, 92, 231, 0.1);
  --accent: #6366f1;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --font-base: 16px;
  --font-size: 16px;
  --line-height: 1.7;
  --max-width: 720px;
  --header-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --transition: 0.25s ease;
}

[data-theme="dark"] {
  --bg: #0f0f1a;
  --bg-card: #1a1a2e;
  --bg-code: #16213e;
  --text: #e4e4e7;
  --text-secondary: #a0a0b0;
  --border: #2a2a3e;
  --primary: #a29bfe;
  --primary-hover: #b8b1ff;
  --primary-light: rgba(162, 155, 254, 0.1);
  --accent: #818cf8;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

[data-font="14"] { --font-size: 14px; }
[data-font="16"] { --font-size: 16px; }
[data-font="18"] { --font-size: 18px; }
[data-font="20"] { --font-size: 20px; }
[data-font="24"] { --font-size: 24px; }

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  font-size: var(--font-size);
  line-height: var(--line-height);
  background: var(--bg);
  color: var(--text);
  padding-top: var(--header-h);
  padding-bottom: calc(80px + var(--safe-bottom));
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
  min-height: 100vh;
}

/* ===== Header ===== */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px;
  gap: 8px; overflow: hidden;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: background var(--transition), border var(--transition);
}
.header-title {
  flex: 1; font-size: 17px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-btn {
  width: 40px; height: 40px; border: none; border-radius: 50%;
  background: transparent; color: var(--text); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  position: relative; transition: background 0.2s;
  overflow: hidden; flex-shrink: 0; touch-action: manipulation;
}
.header-btn:active { background: var(--primary-light); }

/* ===== File Select ===== */
#fileInput { display: none; }

/* ===== Content Area ===== */
.content {
  max-width: var(--max-width); margin: 0 auto;
  padding: 20px 16px 60px; min-height: calc(100vh - var(--header-h) - 80px);
  overflow-x: auto;
}
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; text-align: center; color: var(--text-secondary); gap: 16px;
}
.empty-state .icon { font-size: 64px; opacity: 0.6; }
.empty-state h2 { font-size: 20px; color: var(--text); }
.empty-state p { font-size: 14px; max-width: 280px; line-height: 1.5; }

/* ===== Markdown Content ===== */
.md-content {
  animation: fadeIn 0.3s ease;
}
.md-content > *:first-child { margin-top: 0; }
.md-content h1, .md-content h2, .md-content h3, .md-content h4,
.md-content h5, .md-content h6 {
  margin: 1.5em 0 0.6em; line-height: 1.3; font-weight: 700;
  color: var(--text);
}
.md-content h1 { font-size: 1.6em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
.md-content h2 { font-size: 1.35em; padding-bottom: 0.2em; border-bottom: 1px solid var(--border); }
.md-content h3 { font-size: 1.15em; }
.md-content h4 { font-size: 1em; }
.md-content p { margin: 0.6em 0; }
.md-content a { color: var(--primary); text-decoration: none; }
.md-content a:hover { text-decoration: underline; }
.md-content img { max-width: 100%; height: auto; border-radius: var(--radius-sm); display: block; margin: 1em auto; }
.md-content blockquote {
  margin: 1em 0; padding: 0.8em 1em; border-left: 4px solid var(--primary);
  background: var(--primary-light); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-secondary);
}
.md-content blockquote p { margin: 0.3em 0; }
.md-content ul, .md-content ol { padding-left: 1.5em; margin: 0.6em 0; }
.md-content li { margin: 0.3em 0; }
.md-content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
.md-content code {
  font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
  font-size: 0.85em; padding: 0.15em 0.4em; background: var(--bg-code);
  border-radius: 4px;
}
.md-content pre {
  margin: 1em 0; padding: 1em; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow-x: auto; position: relative; font-size: 0.85em;
  line-height: 1.5;
}
.md-content pre code {
  background: none; padding: 0; font-size: inherit;
  white-space: pre; word-break: normal; overflow-wrap: normal;
}
.md-content > table {
  width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.9em;
}
.md-content table th, .md-content table td {
  border: 1px solid var(--border); padding: 0.5em 0.8em; text-align: left;
}
.md-content table th { background: var(--bg-code); font-weight: 600; }
.md-content table tr:nth-child(even) { background: var(--primary-light); }
.mermaid { margin: 1em 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.katex-display { margin: 1em 0; overflow-x: auto; overflow-y: hidden; }
.md-content pre .copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text-secondary);
  cursor: pointer; opacity: 0.7; transition: opacity 0.2s; -webkit-tap-highlight-color: transparent;
}
.md-content pre:hover .copy-btn, .md-content pre .copy-btn:focus { opacity: 1; }
.md-content pre .copy-btn:active { background: var(--primary-light); }

/* ===== HTML Iframe Content ===== */
.html-frame {
  width: 100%; border: none; border-radius: var(--radius-sm);
  background: white; min-height: calc(100vh - var(--header-h) - 100px);
  box-shadow: var(--shadow);
}

/* ===== Bottom Toolbar ===== */
.toolbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg-card); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding: 8px calc(12px + var(--safe-bottom));
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: background var(--transition), border var(--transition);
  padding-bottom: calc(8px + var(--safe-bottom));
}
.toolbar-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--text-secondary); font-size: 10px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  padding: 4px 12px; transition: color 0.2s; min-width: 56px;
}
.toolbar-btn .icon { font-size: 22px; }
.toolbar-btn.active { color: var(--primary); }
.toolbar-btn:active { opacity: 0.6; }

/* ===== Bottom Sheet / Modal ===== */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.sheet-overlay.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
  background: var(--bg-card); border-radius: 16px 16px 0 0;
  padding: 20px 20px calc(20px + var(--safe-bottom));
  transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 70vh; overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 40px; height: 4px; background: var(--border); border-radius: 2px;
  margin: 0 auto 16px;
}
.sheet-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.sheet-group { margin-bottom: 20px; }
.sheet-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Theme buttons */
.theme-options { display: flex; gap: 8px; }
.theme-opt {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); background: var(--bg);
  text-align: center; font-size: 14px; color: var(--text);
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.2s;
}
.theme-opt.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }

/* Font size */
.font-options { display: flex; gap: 8px; }
.font-opt {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--bg);
  text-align: center; line-height: 40px; font-size: 14px; color: var(--text);
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.2s;
}
.font-opt.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 700; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: calc(var(--header-h) + 16px); left: 50%;
  transform: translateX(-50%) translateY(-20px); z-index: 300;
  background: var(--text); color: var(--bg); padding: 10px 20px;
  border-radius: 20px; font-size: 14px; opacity: 0; pointer-events: none;
  transition: all 0.3s; white-space: nowrap; max-width: 80vw;
  overflow: hidden; text-overflow: ellipsis;
}
.toast.show { opacity: 0.9; transform: translateX(-50%) translateY(0); }

/* ===== Progress bar ===== */
.progress-bar {
  position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 99;
  height: 3px; background: transparent;
}
.progress-bar .fill {
  height: 100%; background: var(--primary); width: 0%;
  transition: width 0.1s linear; border-radius: 0 2px 2px 0;
}

/* ===== Animations ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ===== Loading ===== */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 40vh; gap: 16px; color: var(--text-secondary);
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Excel Table ===== */
.xlsx-wrap { overflow-x: auto; margin: 1em 0; -webkit-overflow-scrolling: touch; }
.xlsx-wrap table { border-collapse: collapse; font-size: 0.85em; }
.xlsx-wrap td, .xlsx-wrap th { border: 1px solid var(--border); padding: 6px 10px; white-space: nowrap; }
.xlsx-wrap th { background: var(--bg-code); font-weight: 600; position: sticky; top: 0; }
.xlsx-wrap td:empty { border-color: transparent; }
.xlsx-sheet-tab {
  display: inline-block; padding: 6px 14px; margin: 0 4px 8px 0;
  border-radius: 6px; font-size: 13px; cursor: pointer;
  border: 1px solid var(--border); color: var(--text-secondary);
  -webkit-tap-highlight-color: transparent;
}
.xlsx-sheet-tab.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }

/* ===== Plain text ===== */
.txt-content {
  white-space: pre-wrap; word-wrap: break-word; word-break: break-all;
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 0.9em; line-height: 1.7; padding: 8px 0;
}

/* ===== PDF container ===== */
.pdf-container { width: 100%; min-height: 70vh; border: none; border-radius: var(--radius-sm); }

/* ===== Code display ===== */
.code-header {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-bottom: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 12px; color: var(--text-secondary);
}
.code-header .lang-badge {
  background: var(--primary-light); color: var(--primary);
  padding: 2px 10px; border-radius: 10px; font-weight: 600; font-size: 11px;
}
.code-header .file-icon { font-size: 16px; }
.code-header .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.code-body {
  margin: 0; padding: 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  overflow-x: auto; font-family: "SF Mono","Fira Code",Consolas,monospace;
  font-size: 0.85em; line-height: 1.6; white-space: pre; tab-size: 2;
}

/* ===== PPT viewer ===== */
.ppt-slide {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 16px;
  overflow: hidden; box-shadow: var(--shadow);
}
.ppt-slide-num {
  padding: 6px 12px; font-size: 12px; font-weight: 600;
  background: var(--bg-code); border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}
.ppt-slide-content {
  padding: 16px; line-height: 1.7; font-size: 0.9em;
}
.ppt-slide-content p { margin: 0.4em 0; }
.ppt-slide-content .ppt-title { font-size: 1.15em; font-weight: 700; margin-bottom: 0.5em; }
.ppt-slide-content .ppt-subtitle { font-size: 0.95em; color: var(--text-secondary); }

/* ===== CSV table ===== */
.csv-table-wrap { overflow-x: auto; margin: 1em 0; }
.csv-table-wrap table { border-collapse: collapse; width: 100%; font-size: 0.85em; }
.csv-table-wrap td, .csv-table-wrap th {
  border: 1px solid var(--border); padding: 6px 10px; white-space: nowrap;
}
.csv-table-wrap th { background: var(--bg-code); font-weight: 600; position: sticky; top: 0; }
.csv-table-wrap tr:nth-child(even) td { background: var(--primary-light); }

/* ===== Office preview ===== */
.docx-preview-wrap { width: 100%; overflow-x: auto; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; align-items: center; padding: 16px; box-sizing: border-box; }
.docx-preview-wrap > * { max-width: 100%; }
.docx-preview-wrap table, .docx-preview-wrap img { max-width: 100%; height: auto; }
.docx-preview-wrap img { object-fit: contain; }
.docx-preview-wrap canvas { max-width: 100%; height: auto; }
.docx-preview-wrap svg { max-width: 100%; height: auto; }
.docx-preview-wrap .docx-wrapper { background: transparent !important; padding: 0 !important; width: 100% !important; }
.docx-preview-wrap .docx-wrapper > section { padding: 48px 56px !important; background: var(--bg-card); border-radius: var(--radius-sm); box-shadow: var(--shadow); max-width: 100% !important; margin: 12px auto !important; box-sizing: border-box !important; overflow-wrap: break-word; position: relative !important; overflow: hidden !important; }
/* Black block workaround: EMF/WMF placeholder shapes */
.docx-preview-wrap img[src^="data:image/x-emf"], .docx-preview-wrap img[src^="data:image/x-wmf"] { opacity: 0.4; border: 1px dashed var(--border); }
.docx-preview-wrap canvas[width="1"][height="1"], .docx-preview-wrap img[width="1"][height="1"] { display: none !important; }

.ppt-slide-wrap { width: 100%; max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.ppt-slide-wrap img { max-width: 100%; height: auto; display: block; }

/* ===== Office whitespace cleanup ===== */
.docx-preview-wrap p:empty, .docx-preview-wrap p:has(br:only-child) { display: none !important; height: 0 !important; margin: 0 !important; padding: 0 !important; }
.docx-preview-wrap .docx-wrapper > section p[style*="margin"] { margin-top: 0.2em !important; margin-bottom: 0.2em !important; }
.doc-empty-removed { display: none !important; }
.ppt-slide-content p:empty { display: none; }

/* ===== Editor ===== */
.md-editor {
  animation: fadeIn 0.25s ease; display: flex; flex-direction: column; gap: 0;
}
.md-editor-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 0;
}
.md-editor-tab {
  padding: 8px 16px; border: none; background: var(--bg); color: var(--text-secondary);
  font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s, border-color 0.2s, background 0.15s;
}
.md-editor-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.md-editor-tab:active { background: var(--primary-light); }
.md-editor-textarea {
  width: 100%; min-height: 50vh; border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  background: var(--bg-card); color: var(--text);
  font-family: "SF Mono","Fira Code",Consolas,monospace;
  font-size: 14px; line-height: 1.6; padding: 16px; resize: vertical;
  outline: none; tab-size: 2; -webkit-tap-highlight-color: transparent;
  transition: opacity 0.2s;
}
.md-editor-textarea:focus { border-color: var(--primary); }
.md-editor-status {
  font-size: 11px; color: var(--text-secondary); padding: 4px 8px;
  text-align: right;
}

/* ===== Action Strip ===== */
.action-strip {
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  position: sticky; top: var(--header-h); z-index: 50;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.action-row {
  display: flex; align-items: center; gap: 2px;
  padding: 4px 8px; overflow-x: auto;
  justify-content: flex-end;
}
.action-btn {
  background: none; border: none;
  font-size: 14px; width: 36px; height: 36px;
  cursor: pointer; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0; color: var(--text);
  transition: background 0.15s, color 0.15s;
}
.action-btn:active { background: var(--primary-light); color: var(--primary); }
.zoom-btn { font-size: 12px; font-weight: 700; width: 30px; height: 30px; }
.zoom-level { font-size: 11px; min-width: 36px; text-align: center; color: var(--text-secondary); user-select: none; }
.search-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px 6px;
  border-top: 1px solid var(--border);
}
.search-bar input {
  flex: 1; padding: 6px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px;
  background: var(--bg-card); color: var(--text);
  outline: none; min-width: 0;
}
.search-bar input:focus { border-color: var(--primary); }
.search-count {
  font-size: 12px; color: var(--text-secondary);
  white-space: nowrap; min-width: 32px; text-align: center;
}
.search-nav {
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 8px; font-size: 11px;
  cursor: pointer; color: var(--text);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.search-nav:active { background: var(--bg-code); }

/* ===== Search highlights ===== */
.search-highlight {
  background: #ffdd57; color: #1a1a2e;
  border-radius: 2px; padding: 0 1px;
}
.search-active {
  background: #ff6b35; color: #fff;
  border-radius: 2px; padding: 0 1px;
}
.dark .search-highlight { background: #b5942e; color: #eee; }
.dark .search-active { background: #d4521e; color: #fff; }
body.auto .search-highlight { background: #ffdd57; color: #1a1a2e; }
body.auto .search-active { background: #ff6b35; color: #fff; }
@media (prefers-color-scheme: dark) {
  body.auto .search-highlight { background: #b5942e; color: #eee; }
  body.auto .search-active { background: #d4521e; color: #fff; }
}

/* ===== Full-width responsive ===== */
.content { max-width: 100%; padding: 12px 8px 80px; }
.md-content { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.md-content > *:first-child { margin-top: 0; }
.csv-table-wrap table { width: 100%; }
.xlsx-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

@media (min-width: 640px) {
  .content { max-width: 100%; padding: 20px 16px 80px; }
}
@media (min-width: 1024px) {
  .content { max-width: 960px; margin: 0 auto; padding: 24px 24px 80px; }
}

/* ===== Drawing Overlay ===== */
#drawOverlay {
  position: fixed; z-index: 55; pointer-events: none; touch-action: none;
  background: transparent; display: none;
}
#drawOverlay.active { pointer-events: auto; }
#drawCanvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

/* ===== Drawing Toolbar ===== */
.draw-toolbar {
  position: fixed; z-index: 60;
  left: 50%; transform: translateX(-50%);
  bottom: calc(70px + var(--safe-bottom));
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: none; align-items: center; gap: 3px;
  padding: 5px 8px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  max-width: calc(100vw - 16px);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.draw-toolbar::-webkit-scrollbar { display: none; }
.draw-sep {
  width: 1px; height: 22px;
  background: var(--border); flex-shrink: 0; margin: 0 2px;
}
.draw-btn {
  width: 32px; height: 32px; border: none; border-radius: 50%;
  background: transparent; color: var(--text);
  font-size: 15px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  transition: background 0.2s;
}
.draw-btn:active { background: var(--primary-light); }
.draw-btn.active { background: var(--primary-light); color: var(--primary); }
.draw-btn.danger { color: #e74c3c; }
.draw-close { font-size: 13px; color: var(--text-secondary); }
#drawColor {
  width: 26px; height: 26px; border: none; padding: 0;
  border-radius: 50%; cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#drawWidth {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text);
  font-size: 11px; padding: 2px 3px; cursor: pointer;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
/* Eraser cursor indicator */
#drawCursor {
  position: fixed; z-index: 56; pointer-events: none; display: none;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.35);
  background: rgba(0,0,0,0.06);
  transform: translate(-50%, -50%);
}

/* ===== Print Styles ===== */
@media print {
  .header, .action-strip, .toolbar, #drawOverlay, #drawToolbar,
  .progress-bar, #toast, #fileInput, .bottom-sheet, #searchBar,
  .empty-state, .loading, #cancelBtn, .sheet-overlay, .sheet-panel { display: none !important; }
  body { padding-top: 0 !important; padding-bottom: 0 !important; overflow: visible !important; }
  .content { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
  .md-content { overflow: visible !important; transform: none !important; }
  #htmlFrame { width: 100% !important; height: 100vh !important; position: relative !important; transform: none !important; }
}

/* ===== Drop Zone Overlay ===== */
.drop-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(108, 92, 231, 0.12);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  pointer-events: none;
}
.drop-overlay.active { display: flex; }
.drop-overlay-inner {
  background: var(--bg-card); border-radius: 20px; padding: 40px 56px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.15); text-align: center;
  border: 3px dashed var(--primary); pointer-events: auto;
}
.drop-overlay-inner .icon { font-size: 56px; margin-bottom: 12px; }
.drop-overlay-inner h3 { font-size: 18px; margin: 0 0 6px; color: var(--text); }
.drop-overlay-inner p { font-size: 13px; color: var(--text-secondary); margin: 0; }

/* ===== File List ===== */
.file-list-item {
  padding: 10px 14px; border-radius: var(--radius-sm); cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: background 0.15s; -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.file-list-item:hover { background: var(--primary-light); }
.file-list-item:active { background: var(--primary); color: #fff; }
.file-list-item .fl-icon { font-size: 16px; flex-shrink: 0; }
.file-list-item .fl-name { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-list-item .fl-path { font-size: 10px; color: var(--text-secondary); display: block; margin-top: 2px; }
.file-list-item .fl-del {
  font-size: 14px; border: none; background: none; cursor: pointer;
  padding: 2px 6px; border-radius: 4px; color: var(--text-secondary);
  -webkit-tap-highlight-color: transparent;
}
.file-list-item .fl-del:hover { background: rgba(231,76,60,0.12); color: #e74c3c; }
.file-list-empty {
  padding: 24px; text-align: center; color: var(--text-secondary); font-size: 13px;
}
/* ===== Image Viewer ===== */
.img-viewer{display:flex;flex-direction:column;align-items:center;gap:12px;padding:12px;height:100%;box-sizing:border-box}
.img-nav{display:flex;align-items:center;gap:12px;padding:6px 0}
.img-nav-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:16px;color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
.img-nav-btn:disabled{opacity:.3;cursor:default}
.img-nav-btn:hover:not(:disabled){background:var(--primary-light);color:var(--primary)}
.img-counter{font-size:13px;color:var(--text-secondary);min-width:60px;text-align:center}
.img-display{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;width:100%;position:relative}
.img-preview{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius-sm);box-shadow:0 2px 8px rgba(0,0,0,.1);pointer-events:none}
.img-nav-overlay{position:absolute;top:0;bottom:0;width:40%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:2;-webkit-tap-highlight-color:transparent;user-select:none}
@media(hover:none){.img-nav-overlay{opacity:1;width:30%}}
.img-nav-overlay:hover{opacity:1}
.img-nav-overlay-left{left:0;background:linear-gradient(90deg,rgba(0,0,0,.08),transparent)}
.img-nav-overlay-right{right:0;background:linear-gradient(270deg,rgba(0,0,0,.08),transparent)}
.img-nav-overlay-left.force-show,.img-nav-overlay-right.force-show{opacity:1}
.img-nav-overlay .nav-arrow{font-size:32px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);background:rgba(0,0,0,.3);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.img-nav-overlay-left .nav-arrow{margin-right:auto;margin-left:8px}
.img-nav-overlay-right .nav-arrow{margin-left:auto;margin-right:8px}
.img-convert-toolbar{display:flex;align-items:center;gap:6px;padding:8px 0;flex-wrap:wrap;justify-content:center}
.img-convert-label{font-size:12px;color:var(--text-secondary)}
.img-convert-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 12px;cursor:pointer;font-size:12px;color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
.img-convert-btn:hover{background:var(--primary-light);color:var(--primary)}
#debugPanel {
  position: fixed; bottom:0; left:0; right:0;
  background: rgba(0,0,0,.88); color: #0f0;
  font: 12px/1.4 monospace; padding: 10px;
  z-index: 99999; white-space: pre-wrap;
  max-height: 250px; overflow-y: auto;
  display: none; user-select: text; cursor: text;
}
#debugPanel.show { display: block; }
#debugPanel::before { content: '📋 点击可复制 | '; color: #888; font-size: 11px; }
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:#f8f9fa;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s">
  <div style="font-size:48px;margin-bottom:12px">📖</div>
  <div style="font-size:16px;color:#1a1a2e">通用阅读器</div>
  <div style="margin-top:16px;width:24px;height:24px;border:2px solid #ddd;border-top-color:#4a6cf7;border-radius:50%;animation:spinner .6s linear infinite"></div>
  <style>@keyframes spinner{to{transform:rotate(360deg)}}</style>
</div>

<!-- Header -->
<header class="header">
  <button class="header-btn" id="menuBtn" aria-label="菜单">☰</button>
  <span class="header-title" id="titleDisplay">通用阅读器</span>
  <button class="header-btn" id="openBtn" aria-label="打开文件">📂</button>
</header>

<!-- Progress -->
<div class="progress-bar"><div class="fill" id="progressFill"></div></div>

<!-- Action Strip -->
<div class="action-strip" id="actionStrip" style="display:none">
  <div class="action-row" id="actionRow">
    <button class="action-btn" id="actSearch" title="搜索">🔍</button>
    <button class="action-btn" id="actCopy" title="复制全部">📋</button>
    <button class="action-btn" id="actBmAdd" title="添加书签">🔖</button>
    <button class="action-btn" id="actBmList" title="书签列表">📑</button>
    <button class="action-btn" id="actUrl" title="浏览网址">🌐</button>
    <button class="action-btn" id="actEdit" title="编辑模式" style="display:none">📝</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="action-btn zoom-btn" id="actZoomOut" title="缩小">A−</button>
    <span class="zoom-level" id="zoomDisplay">100%</span>
    <button class="action-btn zoom-btn" id="actZoomIn" title="放大">A+</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="action-btn" id="actDraw" title="标注">🖌️</button>
    <button class="action-btn" id="actPrint" title="打印">🖨️</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="action-btn" id="actPrev" title="上一个文件" style="display:none">◀</button>
    <span class="doc-counter" id="docCounter" style="display:none;font-size:12px;color:var(--text-secondary);min-width:40px;text-align:center"></span>
    <button class="action-btn" id="actNext" title="下一个文件" style="display:none">▶</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="action-btn" id="actClear" title="清空文档" style="color:#e74c3c">🗑️</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="action-btn" id="actAiSummary" title="AI 总结">🤖</button>
  </div>
  <div class="search-bar" id="searchBar" style="display:none">
    <input type="text" id="searchInput" placeholder="搜索关键词..." autocomplete="off">
    <span class="search-count" id="searchCount">0</span>
    <button class="search-nav" id="searchPrev" title="上一个">▲</button>
    <button class="search-nav" id="searchNext" title="下一个">▼</button>
    <button class="search-nav" id="searchClose" title="关闭">✕</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Content -->
<div class="content" id="contentArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">📖</div>
    <h2>打开一个文件</h2>
    <p>支持 MD / HTML / TXT / PDF / Word / Excel / PPT / CSV<br>以及 JSON / XML / YAML / 代码 / 配置文件 等<br>点击右上角 📂 选择文件</p>
    <div id="restoreBtnArea" style="margin-top:16px;display:none">
      <button class="theme-opt" id="restoreBtn" style="background:var(--primary);color:#fff;padding:10px 24px;font-size:15px">📖 恢复上次阅读</button>
    </div>
    <div id="buildId" style="margin-top:8px;font-size:10px;color:var(--text-secondary);opacity:0.5" data-build="20260721-0751">BUILD: dev</div>
  </div>
  <div class="loading" id="loadingIndicator" style="display:none">
    <div class="spinner" id="loadingSpinner"></div>
    <span id="loadingText">加载中...</span>
    <button id="cancelBtn" style="margin-top:8px;padding:8px 20px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;display:none;-webkit-tap-highlight-color:transparent">✕ 取消</button>
  </div>
  <div id="mdContent" class="md-content" style="display:none"></div>
  <iframe id="htmlFrame" class="html-frame" style="display:none"></iframe>
  <div id="mdEditor" class="md-editor" style="display:none">
    <div class="md-editor-tabs">
      <button class="md-editor-tab active" data-tab="edit">📝 编辑</button>
      <button class="md-editor-tab" data-tab="preview">👁️ 预览</button>
    </div>
    <textarea id="mdEditorTextarea" class="md-editor-textarea" spellcheck="false"></textarea>
    <div class="md-editor-status" id="mdEditorStatus">就绪</div>
  </div>
</div>

<!-- Drop Zone Overlay -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-overlay-inner">
    <div class="icon">📁</div>
    <h3>拖拽文件/文件夹导入</h3>
    <p>支持所有格式（单文件或整个文件夹，批量导入）</p>
  </div>
</div>

<!-- Drawing Overlay -->
<div id="drawOverlay"><canvas id="drawCanvas"></canvas></div>

<!-- Drawing Toolbar -->
<div class="draw-toolbar" id="drawToolbar">
  <button class="draw-btn active" data-mode="pen" title="画笔">✏️</button>
  <button class="draw-btn" data-mode="highlighter" title="荧光笔">🖍️</button>
  <button class="draw-btn" data-mode="eraser" title="橡皮">🧹</button>
  <span class="draw-sep"></span>
  <button class="draw-btn" data-mode="text" title="文字标注">T</button>
  <button class="draw-btn" data-mode="line" title="直线">╱</button>
  <button class="draw-btn" data-mode="arrow" title="箭头">→</button>
  <button class="draw-btn" data-mode="rect" title="矩形">□</button>
  <button class="draw-btn" data-mode="ellipse" title="椭圆">○</button>
  <span class="draw-sep"></span>
  <input type="color" id="drawColor" value="#e74c3c" title="颜色">
  <select id="drawWidth" title="粗细">
    <option value="2">细</option>
    <option value="4" selected>中</option>
    <option value="8">粗</option>
    <option value="16">极粗</option>
  </select>
  <span class="draw-sep"></span>
  <span id="textControls" style="display:none;align-items:center;gap:2px">
    <button class="draw-btn" id="textSizeDown" title="缩小字号" style="font-size:12px">A−</button>
    <span id="textSizeDisplay" style="font-size:11px;color:var(--text);min-width:18px;text-align:center">16</span>
    <button class="draw-btn" id="textSizeUp" title="增大字号" style="font-size:12px">A+</button>
    <button class="draw-btn" id="textEdit" title="编辑文字" style="font-size:13px">✏️</button>
    <button class="draw-btn danger" id="textDelete" title="删除文字">✕</button>
  </span>
  <span class="draw-sep"></span>
  <button class="draw-btn" id="drawUndo" title="撤销 (Ctrl+Z)">↩️</button>
  <button class="draw-btn" id="drawRedo" title="恢复 (Ctrl+Shift+Z)">↪️</button>
  <span class="draw-sep"></span>
  <button class="draw-btn danger" id="drawClear" title="清除所有标注">🗑️</button>
  <button class="draw-btn" id="drawToggleVis" title="显示/隐藏标注">👁️</button>
  <button class="draw-btn draw-close" id="drawClose" title="关闭标注">✕</button>
</div>
<!-- Eraser cursor indicator -->
<div id="drawCursor"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".md,.html,.htm,.txt,.log,.pdf,.doc,.docx,.wps,.wpt,.xls,.xlsx,.et,.ett,.pptx,.dps,.dpt,.csv,.json,.xml,.yaml,.yml,.js,.ts,.jsx,.tsx,.mjs,.cjs,.vue,.svelte,.astro,.py,.rb,.php,.sh,.bash,.zsh,.css,.scss,.less,.sass,.styl,.java,.c,.cpp,.h,.hpp,.go,.rs,.swift,.kt,.dart,.lua,.r,.pl,.sql,.tex,.rst,.bat,.cmd,.ps1,.psm1,.psd1,.ini,.cfg,.conf,.toml,.env,.gradle,.s,.spec,.dockerfile,.gitignore,.editorconfig,.htaccess,.makefile,.cmake,.reg,.vbs,.wsf,.ahk,.asm,.wasm,.zig,.nim,.cr,.hs,.clj,.erl,.ex,.exs,.fs,.cs,.scala,.png,.jpg,.jpeg,.gif,.webp,.bmp,.svg,.ico,.heic,.heif,.avif,.tiff,.tif,text/markdown,text/plain,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,image/*">

<!-- Bottom Toolbar -->
<nav class="toolbar">
  <button class="toolbar-btn" id="tbTheme" data-action="theme">
    <span class="icon">🌓</span><span>主题</span>
  </button>
  <button class="toolbar-btn" id="tbFont" data-action="font">
    <span class="icon">Aa</span><span>字号</span>
  </button>
  <button class="toolbar-btn" id="tbStats" data-action="stats">
    <span class="icon">📊</span><span>统计</span>
  </button>
  <button class="toolbar-btn" id="tbAi" data-action="ai">
    <span class="icon">🤖</span><span>AI</span>
  </button>
  <button class="toolbar-btn" id="tbScrollUp" data-action="scroll-up">
    <span class="icon">↑</span><span>顶部</span>
  </button>
  <button class="toolbar-btn" id="tbScrollDown" data-action="scroll-down">
    <span class="icon">↓</span><span>底部</span>
  </button>
  <button class="toolbar-btn" id="tbFullscreen" data-action="fullscreen">
    <span class="icon">⛶</span><span>全屏</span>
  </button>
</nav>

<!-- Bottom Sheet (Theme/Font Settings) -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div id="sheetBody"></div>
</div>

<script defer src="app.bundle.js"></script>
<div id="debugPanel"></div>
</body>
</html>
