name: Build
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则使用 tag 名)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            artifact-name: linux-amd64-bundles
            artifact-path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - platform: ubuntu-24.04-arm
            args: '--target aarch64-unknown-linux-gnu'
            artifact-name: linux-arm64-bundles
            artifact-path: |
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
          - platform: macos-latest
            args: ''
            artifact-name: macos-bundle
            artifact-path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            args: ''
            artifact-name: windows-bundles
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ -n "${GITHUB_REF#refs/tags/v}" ] && [ "${GITHUB_REF#refs/tags/v}" != "${GITHUB_REF}" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Sync version to config files
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Building version: $VERSION"
          node -e '
            var fs = require("fs");
            var V = process.argv[1];
            var clean = V.replace(/-.*$/, "");
            var tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json","utf8"));
            tauri.version = clean;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauri, null, 2) + "\n");
            var pkg = JSON.parse(fs.readFileSync("package.json","utf8"));
            pkg.version = clean;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
            var cargo = fs.readFileSync("src-tauri/Cargo.toml","utf8");
            cargo = cargo.replace(/^version = ".*"/m, "version = \"" + clean + "\"");
            fs.writeFileSync("src-tauri/Cargo.toml", cargo);
            var cap = JSON.parse(fs.readFileSync("capacitor.config.json","utf8"));
            cap.versionName = V;
            var p = clean.split(".").map(Number);
            cap.versionCode = Math.max(1, (p[0]||0)*10000 + (p[1]||0)*100 + (p[2]||0));
            fs.writeFileSync("capacitor.config.json", JSON.stringify(cap, null, 2) + "\n");
            var g = fs.readFileSync("android/app/build.gradle","utf8");
            g = g.replace(/versionCode \d+/, "versionCode " + cap.versionCode);
            g = g.replace(/versionName "[^"]*"/, "versionName \"" + V + "\"");
            fs.writeFileSync("android/app/build.gradle", g);
          ' "$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux ARM64 native deps
        if: matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install Linux x64 system deps
        if: runner.os == 'Linux' && matrix.platform != 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm deps
        run: npm ci

      - name: Build with Tauri
        run: npm run tauri:build -- ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ -n "${GITHUB_REF#refs/tags/v}" ] && [ "${GITHUB_REF#refs/tags/v}" != "${GITHUB_REF}" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Sync version to config files
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Building version: $VERSION"
          node -e '
            var fs = require("fs");
            var V = process.argv[1];
            var clean = V.replace(/-.*$/, "");
            var tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json","utf8"));
            tauri.version = clean;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauri, null, 2) + "\n");
            var pkg = JSON.parse(fs.readFileSync("package.json","utf8"));
            pkg.version = clean;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
            var cargo = fs.readFileSync("src-tauri/Cargo.toml","utf8");
            cargo = cargo.replace(/^version = ".*"/m, "version = \"" + clean + "\"");
            fs.writeFileSync("src-tauri/Cargo.toml", cargo);
            var cap = JSON.parse(fs.readFileSync("capacitor.config.json","utf8"));
            cap.versionName = V;
            var p = clean.split(".").map(Number);
            cap.versionCode = Math.max(1, (p[0]||0)*10000 + (p[1]||0)*100 + (p[2]||0));
            fs.writeFileSync("capacitor.config.json", JSON.stringify(cap, null, 2) + "\n");
            var g = fs.readFileSync("android/app/build.gradle","utf8");
            g = g.replace(/versionCode \d+/, "versionCode " + cap.versionCode);
            g = g.replace(/versionName "[^"]*"/, "versionName \"" + V + "\"");
            fs.writeFileSync("android/app/build.gradle", g);
          ' "$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Android SDK
        run: |
          # Try pre-installed SDK on runner
          if [ -d "/usr/local/lib/android/sdk" ]; then
            SDK="/usr/local/lib/android/sdk"
          elif [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME" ]; then
            SDK="$ANDROID_HOME"
          else
            echo "No pre-installed SDK found, installing..."
            mkdir -p $HOME/android/sdk
            SDK="$HOME/android/sdk"
            curl -fsSL -o /tmp/cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
            mkdir -p "$SDK/cmdline-tools"
            mv /tmp/cmdline-tools/cmdline-tools "$SDK/cmdline-tools/latest"
          fi
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "Using Android SDK at: $SDK"

      - name: Install required SDK platforms
        run: |
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          if [ ! -d "$SDK" ]; then
            SDK="/usr/local/lib/android/sdk"
          fi
          echo "SDK=$SDK"
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

          # Locate sdkmanager
          SDKMANAGER=""
          for p in "$SDK/cmdline-tools/latest/bin/sdkmanager" \
                    "$SDK/tools/bin/sdkmanager" \
                    "$SDK/cmdline-tools/*/bin/sdkmanager"; do
            for f in $p; do
              if [ -x "$f" ]; then SDKMANAGER="$f"; break 2; fi
            done
          done

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found, installing cmdline-tools..."
            mkdir -p "$SDK/cmdline-tools"
            curl -fsSL -o /tmp/ct.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q /tmp/ct.zip -d /tmp/ct
            mv /tmp/ct/cmdline-tools "$SDK/cmdline-tools/latest"
            SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"
          fi
          echo "sdkmanager=$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses --sdk_root="$SDK" || true
          "$SDKMANAGER" --install "platforms;android-36" "build-tools;36.0.0" --sdk_root="$SDK"
          echo "=== SDK platforms ==="
          ls -la "$SDK/platforms/" 2>/dev/null || echo "No platforms dir"
          echo "=== build-tools ==="
          ls -la "$SDK/build-tools/" 2>/dev/null || echo "No build-tools dir"

      - name: Install npm deps
        run: npm ci

      - name: Setup debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore

      - name: Generate debug keystore (if not cached)
        run: |
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            mkdir -p $HOME/.android
            keytool -genkeypair -v -keystore $HOME/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Check Gradle wrapper
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 || echo "Gradle check failed but continuing"

      - name: Sync Android
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          npx cap sync android

      - name: Build Android APK
        shell: bash
        run: |
          cd android
          chmod +x gradlew
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "=== local.properties ==="
          cat local.properties 2>/dev/null || echo "(no local.properties)"
          echo "=== SDK contents ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
          echo "=== Java version ==="
          java -version 2>&1 || true
          echo "=== Running Gradle ==="
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/gradle-build.log
          exit_code=${PIPESTATUS[0]}
          echo "GRADLE_EXIT_CODE=$exit_code" >> $GITHUB_ENV
          if [ $exit_code -ne 0 ]; then
            echo "## Gradle Build Failed (exit code $exit_code)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -200 /tmp/gradle-build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $exit_code

      - name: Upload Gradle build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log

      - name: Rename APK
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/通用阅读器_${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ -n "${GITHUB_REF#refs/tags/v}" ] && [ "${GITHUB_REF#refs/tags/v}" != "${GITHUB_REF}" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Sync version to config files
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Building version: $VERSION"
          node -e '
            var fs = require("fs");
            var V = process.argv[1];
            var pkg = JSON.parse(fs.readFileSync("package.json","utf8"));
            pkg.version = V;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
            var cap = JSON.parse(fs.readFileSync("capacitor.config.json","utf8"));
            cap.versionName = V;
            var p = V.replace(/-.*$/, "").split(".").map(Number);
            cap.versionCode = Math.max(1, (p[0]||0)*10000 + (p[1]||0)*100 + (p[2]||0));
            fs.writeFileSync("capacitor.config.json", JSON.stringify(cap, null, 2) + "\n");
          ' "$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios

      - name: Add & Sync iOS platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Build iOS
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package iOS app
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          cd ios/App/build
          zip -r "通用阅读器_${VERSION}_ios.zip" App.xcarchive

      - name: Upload iOS app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/App/build/*.zip

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [build, android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "APP_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi

      - uses: actions/download-artifact@v4

      - name: Delete old release if exists
        continue-on-error: true
        run: gh release delete v${{ env.APP_VERSION }} --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: 通用阅读器 v${{ env.APP_VERSION }}
          body: |
            ## 通用阅读器 / Universal Reader v${{ env.APP_VERSION }}

            一个支持 15+ 种文件格式的跨平台万能阅读器。

            ### 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `windows-bundles` 中的 `.exe` | 推荐 NSIS 安装包 |
            | macOS | `macos-bundle` 中的 `.dmg` | 拖入 Applications |
            | Linux x64 | `linux-amd64-bundles` 中的 `.AppImage` | 适用于银河麒麟/深度UOS |
            | Linux ARM64 | `linux-arm64-bundles` 中的 `.AppImage` | 适用于 ARM64 国产系统 |
            | Android | `android-apk` 中的 `.apk` | 直接安装 |
            | iOS | `ios-app` 中的 `.zip` | 需 Xcode 签名后安装 |

            ### 功能亮点
            - 全格式阅读：MD / HTML / PDF / Word / Excel / PPT / CSV / 代码 / 图片
            - 数学公式 (KaTeX) + Mermaid 图表
            - PDF 注释工具（高亮/下划线/矩形/批注/便签）
            - 加密 Office 文档解密
            - 暗色模式 + 会话恢复
            - 完全离线可用
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            linux-amd64-bundles/**/*
            linux-arm64-bundles/**/*
            macos-bundle/**/*
            windows-bundles/**/*
            android-apk/**/*
            ios-app/**/*.zip
