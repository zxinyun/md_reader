name: Build
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            artifact-name: linux-amd64-bundles
            artifact-path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - platform: ubuntu-24.04-arm
            args: '--target aarch64-unknown-linux-gnu'
            artifact-name: linux-arm64-bundles
            artifact-path: |
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            artifact-name: macos-bundle
            artifact-path: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest
            args: ''
            artifact-name: windows-bundles
            artifact-path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm deps
        run: npm ci

      - name: Build with Tauri
        run: npm run tauri:build -- ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Setup debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore

      - name: Generate debug keystore (if not cached)
        run: |
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            mkdir -p $HOME/.android
            keytool -genkeypair -v -keystore $HOME/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Sync Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/通用阅读器.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios

      - name: Add & Sync iOS platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package iOS app
        run: |
          cd ios/App/build
          zip -r 通用阅读器_ios.zip App.xcarchive

      - name: Upload iOS app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/App/build/通用阅读器_ios.zip

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [build, android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "APP_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4

      - name: Delete old release if exists
        continue-on-error: true
        run: gh release delete v${{ env.APP_VERSION }} --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: 通用阅读器 v${{ env.APP_VERSION }}
          body: |
            ## 通用阅读器 v${{ env.APP_VERSION }}

            ### 桌面版（Tauri）
            - **linux-amd64-bundles**: x86_64 AppImage + deb（适用于 银河麒麟/深度UOS）
            - **linux-arm64-bundles**: ARM64 AppImage + deb（适用于 ARM64 的 银河麒麟/深度UOS）
            - **macos-bundle**: macOS DMG 安装包
            - **windows-bundles**: Windows MSI + NSIS 安装包

            ### 移动版（Capacitor）
            - **android-apk**: Android APK（可直接安装）
            - **ios-app**: iOS 归档（需签名后安装）
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            linux-amd64-bundles/**/*
            linux-arm64-bundles/**/*
            macos-bundle/**/*
            windows-bundles/**/*
            android-apk/**/*
            ios-app/**/*
